<!DOCTYPE html>
<html>
<head>
    <title>Remmie Komm Hub - Payment Success</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #0d2b3e, #1a4a6f);
            color: white;
        }
        .panel {
            max-width: 500px;
            margin: auto;
            padding: 40px;
            background: white;
            border-radius: 20px;
            color: #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 { color: #28a745; }
        .brand { 
            color: #1a4a6f; 
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1a4a6f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            background: #1a4a6f;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
        }
        .btn:hover { background: #0d2b3e; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="panel">
        <div class="brand">🔷 REMMIE KOMM HUB</div>
        <h1>✔ Payment Successful!</h1>
        <p id="status">Generating your Internship Report...</p>
        <div id="loader" class="loader"></div>
        
        <div id="reportPreview" style="display:none;"></div>
        
        <div id="final-actions" style="display:none; margin-top: 20px;">
            <button onclick="downloadPDF()" class="btn">📥 Download Report Again</button>
            <button onclick="location.href='https://internship-report-builder.netlify.app/'" class="btn" style="background: #28a745;">🏠 Create Another Report</button>
        </div>
    </div>

    <script>
        function downloadPDF() {
            const el = document.getElementById('reportPreview');
            const filename = 'Remmie_Komm_Hub_Internship_Report.pdf';
            
            html2pdf().from(el).set({
                margin: 0.5,
                filename: filename,
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
            }).save().then(() => {
                document.getElementById('status').innerText = "Download Complete!";
                document.getElementById('final-actions').style.display = "block";
            });
        }

        window.onload = function() {
            const data = JSON.parse(localStorage.getItem('internshipReportData'));
            const reportHTML = localStorage.getItem('generatedReportHTML');
            
            document.getElementById('status').innerHTML = `Your Internship Report is ready!<br>Generating download...`;
            
            if (data || reportHTML) {
                const content = reportHTML || (data ? generateReportFromData(data) : '');
                document.getElementById('reportPreview').innerHTML = `<div style="font-family: 'Times New Roman', serif; padding: 20px;">${content}</div>`;
                setTimeout(downloadPDF, 1000);
            } else {
                document.getElementById('status').innerText = "Report ready. Click download below.";
                document.getElementById('loader').style.display = "none";
                document.getElementById('final-actions').style.display = "block";
            }
        };
        
        function generateReportFromData(data) {
            return `
                <h1 style="text-align:center;">INTERNSHIP REPORT</h1>
                <p style="text-align:center;">${data.studentName || 'Student Name'}</p>
                <p style="text-align:center;">${data.university || 'University'}</p>
                <hr>
                <p>Thank you for using Remmie Komm Hub. Your complete internship report has been generated.</p>
            `;
        }
    </script>
</body>
</html>
